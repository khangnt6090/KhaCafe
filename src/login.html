<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Khà Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <h2 class="login-title">Đăng nhập Khà Cafe</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập admin" required>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập 123" required>
            </div>
            <p id="errorMessage" class="error-msg"></p>
            <button type="submit" class="btn-primary btn-login">Đăng nhập</button>
                <p class="small-link">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </form>
    </div>

    <script>
            // Quản lý users trong localStorage (demo, không mã hóa mật khẩu)
            function getUsers(){ try { return JSON.parse(localStorage.getItem('kha_users_v1')||'[]'); } catch(e){ return []; } }
            function findUser(username, password){
                const users = getUsers();
                return users.find(u=>u.username === username && u.password === password);
            }

            function setCurrentUser(username){ localStorage.setItem('kha_current_user', JSON.stringify({ username })); }

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const user = document.getElementById('username').value.trim();
                const pass = document.getElementById('password').value;
                // Kiểm tra user đã đăng ký
                if (findUser(user, pass) || (user === 'admin' && pass === '123')) {
                    setCurrentUser(user);
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('errorMessage').innerText = 'Tên đăng nhập hoặc mật khẩu không đúng!';
                }
            });
    </script>
</body>
</html>
